name: Build Kotlin APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleRelease

      - name: Locate APK
        run: |
          find app/build -name "*.apk" -type f
          cp $(find app/build -name "*.apk" -type f | head -1) app/build/app-release.apk

      - name: Upload APK (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/app-release.apk

      - name: Create Release & Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_id }}
          name: Build #${{ github.run_number }}
          files: app/build/app-release.apk
          make_latest: true
          fail_on_unmatched_files: false
